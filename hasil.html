<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cek Hasil Laboratorium</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url('XL2.jpg') no-repeat center center fixed;
  background-size:cover;
  padding:20px;
}

.container{
  width:100%;
  max-width:450px;
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(12px);
  border:1px solid rgba(74,222,128,.6);
  border-radius:24px;
  padding:30px 25px;
  color:#064e3b;
  box-shadow:0 20px 40px rgba(0,0,0,.1);
}

.logo{
  text-align:center;
  margin-bottom:25px;
}

.logo h1{
  font-size:24px;
  margin-bottom:8px;
  color:#16a34a;
  letter-spacing:0.5px;
}

.logo p{
  font-size:13px;
  opacity:.8;
}

.form-group{
  margin-bottom:18px;
}

label{
  display:block;
  margin-bottom:6px;
  font-size:13px;
  letter-spacing:0.3px;
  opacity:0.9;
}

input{
  width:100%;
  padding:12px 16px;
  border:1px solid rgba(74,222,128,.4);
  border-radius:12px;
  background:rgba(255,255,255,.9);
  color:#064e3b;
  font-size:14px;
  outline:none;
  transition:all 0.3s ease;
}

input::placeholder{
  color:rgba(6,78,59,.5);
  font-size:13px;
}

input:focus{
  background:#fff;
  border-color:#4ade80;
  box-shadow:0 0 8px rgba(74,222,128,.4);
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#4ade80;
  color:#022c22;
  font-size:15px;
  font-weight:bold;
  letter-spacing:0.5px;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 16px rgba(74,222,128,.4);
}

.loading{
  display:none;
  text-align:center;
  margin-top:20px;
}

.result{
  display:none;
  margin-top:20px;
  padding:18px;
  border-radius:12px;
  background:rgba(74,222,128,.1);
  font-size:14px;
}

.result a{
  color:#16a34a;
  text-decoration:none;
  font-weight:bold;
  word-break:break-all;
  font-size:14px;
}

.error{
  display:none;
  margin-top:20px;
  background:#fee2e2;
  color:#dc2626;
  padding:15px;
  border-radius:12px;
  font-size:14px;
}

@media(max-width:500px){

  .container{
    padding:24px 20px;
  }

  .logo h1{
    font-size:20px;
  }

}

</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <h1>🔬 Hasil Laboratorium</h1>
    <p>Masukkan MRN dan Tanggal Lahir</p>
  </div>

  <div class="form-group">
    <label>MRN</label>
    <input
      type="text"
      id="mrn"
      placeholder="Nomor Rekam Medis">
  </div>

  <div class="form-group">
    <label>Tanggal Lahir</label>
    <input
      type="date"
      id="tgl">
  </div>

  <button onclick="cariData()">
    Cari Hasil
  </button>

  <div class="loading" id="loading">
    Mencari data...
  </div>

  <div class="error" id="error"></div>

  <div class="result" id="result">
    <h3>Data Ditemukan</h3>
    <br>
    <div id="hasil"></div>
  </div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbwYx8kYaK0yP9Uk9_fevUzWFlz1gFgZDbl9yY9RyyfN6dQ3timOEKBi4j5bz4MPA2X8/exec";

async function cariData(){

  const mrn = document.getElementById("mrn").value.trim();

  const tglInput = document.getElementById("tgl").value;

  if(!mrn || !tglInput){
    alert("Lengkapi data terlebih dahulu");
    return;
  }

  const [y,m,d] = tglInput.split("-");
  const tglLahir = `${d}/${m}/${y}`;

  document.getElementById("loading").style.display="block";
  document.getElementById("result").style.display="none";
  document.getElementById("error").style.display="none";

  try{

    const response = await fetch(
      `${API_URL}?mrn=${encodeURIComponent(mrn)}&tgllahir=${encodeURIComponent(tglLahir)}`
    );

    const json = await response.json();

    document.getElementById("loading").style.display="none";

    if(!json.success){

      document.getElementById("error").style.display="block";
      document.getElementById("error").innerHTML=json.message;
      return;
    }

    const data = json.data[0];

    let html = "";

    html += `<p><b>Nama:</b> ${data[1]}</p>`;

    if(data[10]){
      html += `
      <br>
      <a href="${data[10]}" target="_blank">
      📄 Download Hasil Laboratorium
      </a>`;
    } else if(data[9]) {
      html += `
      <br>
      <p style="color: rgba(6,78,59,.7);"><i>${data[9]}</i></p>`;
    }

    document.getElementById("hasil").innerHTML=html;
    document.getElementById("result").style.display="block";

  }catch(err){

    document.getElementById("loading").style.display="none";

    document.getElementById("error").style.display="block";

    document.getElementById("error").innerHTML=
    "Terjadi kesalahan saat mengambil data.";

  }

}

</script>

</body>
</html>
